{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENA - Editar Usuario</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <link rel="stylesheet" href="{% static 'css/edit_user.css' %}">
</head>

<body>
    <header class="dash-header">
        <h1>Editar Usuario</h1>
        <a href="{% url 'admin_dashboard' %}" class="btn-logout" style="background-color: #6c757d;">Volver al
            Dashboard</a>
    </header>

    <div class="dash-container">

        <div class="edit-form-container">
            <h2 style="text-align: center; margin-bottom: 30px;">Modificar datos de <span
                    style="color:var(--accent);">{{ user_to_edit.first_name }}</span></h2>

            <form action="{% url 'edit_user' user_to_edit.id %}" method="POST"
                style="display:flex; flex-direction:column; align-items:flex-start;">
                {% csrf_token %}

                <label class="form-label">Nombres</label>
                <div class="input-group" style="margin-bottom: 20px;">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" name="nombres" value="{{ user_to_edit.first_name }}" required />
                </div>

                <label class="form-label">Apellidos</label>
                <div class="input-group" style="margin-bottom: 20px;">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" name="apellidos" value="{{ user_to_edit.last_name }}" required />
                </div>

                <label class="form-label">Correo electrónico</label>
                <div class="input-group" style="margin-bottom: 20px;">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" name="email" value="{{ user_to_edit.email }}" required />
                </div>

                <label class="form-label">Número de documento</label>
                <div class="input-group" style="margin-bottom: 20px;">
                    <i class="fa-solid fa-id-card"></i>
                    <input type="text" name="documento" value="{{ user_to_edit.documento }}" required />
                </div>

                <label class="form-label">Rol del usuario</label>
                <div class="input-group" style="margin-bottom: 20px;">
                    <i class="fa-solid fa-users"></i>
                    <select style="padding-left: 40px;" name="rol" required>
                        <option value="ADMINISTRADOR" {% if user_to_edit.rol=='ADMINISTRADOR' %}selected{% endif %}>
                            Administrador</option>
                        <option value="APRENDIZ" {% if user_to_edit.rol=='APRENDIZ' %}selected{% endif %}>Aprendiz
                        </option>
                    </select>
                </div>

                <label class="form-label">Nueva contraseña (Déjalo vacío para no cambiarla)</label>
                <div class="input-group" style="margin-bottom: 30px;">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" name="password" placeholder="Min. 8 caracteres..." />
                </div>

                <button type="submit" class="btn-primary" style="padding:15px; font-size:15px;">Guardar Cambios</button>
            </form>
        </div>
    </div>
</body>

</html>
