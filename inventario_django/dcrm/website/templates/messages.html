{% if messages %}
<div class="messages-container">
    {% for message in messages %}
    <div class="alert alert-{{ message.tags }}">
        <span class="alert-icon">
            {% if message.tags == 'success' %}<i class="fa-solid fa-circle-check"></i>
            {% elif message.tags == 'error' %}<i class="fa-solid fa-circle-xmark"></i>
            {% elif message.tags == 'warning' %}<i class="fa-solid fa-triangle-exclamation"></i>
            {% else %}<i class="fa-solid fa-circle-info"></i>
            {% endif %}
        </span>
        <span class="alert-text">{{ message }}</span>
        <button class="alert-close" onclick="this.parentElement.remove()">
            <i class="fa-solid fa-xmark"></i>
        </button>
    </div>
    {% endfor %}
</div>
<script>
    setTimeout(() => {
        document.querySelectorAll('.alert').forEach(a => {
            a.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
            a.style.opacity = '0';
            a.style.transform = 'translateX(40px)';
            setTimeout(() => a.remove(), 400);
        });
    }, 4000);
</script>
{% endif %}
